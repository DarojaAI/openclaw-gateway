name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Python syntax
        run: |
          python3 -m py_compile scripts/*.py
          if compgen -G "scripts/install/*.py" > /dev/null; then
            python3 -m py_compile scripts/install/*.py
          fi

      - name: Validate Bash syntax
        run: |
          bash -n scripts/*.sh scripts/remote/*.sh
          if compgen -G "scripts/install/*.sh" > /dev/null; then
            bash -n scripts/install/*.sh
          fi

      - name: Validate JSON config
        run: |
          python3 -c "import json; json.load(open('config/openclaw-defaults.json'))"
          python3 -c "import json; json.load(open('config/openclaw-test-vm.json'))"

      - name: Check skill files exist
        run: |
          test -f config/skills/model-management/SKILL.md
          test -f config/skills/maintenance/SKILL.md
          test -f config/skills/session-commands/SKILL.md
