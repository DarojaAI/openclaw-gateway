# Pre-commit configuration for openclaw-gateway.
#
# Runs only on the files the developer has staged, so the
# ``pre-commit run --files <list>`` invocation in the deploy
# instructions stays fast. Hooks cover the file types the gateway
# actually uses: Python (for the .py scripts), shell (for the
# installers and BATS helpers), Markdown (for skills and docs),
# and JSON (for config overlays).
#
# Excluded: viz service ``node_modules/`` and the seed's
# ``__pycache__/`` — these are runtime artifacts, not source.
exclude: ^(config/services/viz/node_modules/|__pycache__/|\.git/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: [-x, -S, error]
        files: ^(scripts/|tests/helpers/.*\.sh$)

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        files: \.(yml|yaml)$
        args: [-c, .yamllint.yaml]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: bats-agent-config
        name: bats (agent-config schema + drift)
        description: |
          Run the agent-config BATS suites against any staged BATS / schema /
          example-yaml / version-pin changes. Fails locally before CI does,
          matching the linux-desktop-seed pre-commit + bats pattern. Skips
          gracefully when no relevant files are staged or when bats /
          jsonschema / pyyaml are not installed locally.
        entry: scripts/ci/run-agent-config-bats.sh
        language: system
        pass_filenames: false
        files: ^(tests/agent-config-.*\.bats|schemas/agent-config\.schema\.json|config/openclaw-agent-config\.example\.yaml|config/openclaw-version)$
